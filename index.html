<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 동조질량댐퍼(TMD) 내진 설계 시뮬레이션</title>
    
    <link type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/themes/smoothness/jquery-ui.min.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 20px; background-color: #ffffff; font-family: 'Malgun Gothic', sans-serif; }
        .glowscript { width: 800px; margin: 0 auto; }
        .ui-slider { margin: 10px 0; } 
    </style>
    
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/glow.3.2.min.js"></script>
    <script type="text/javascript" src="https://www.glowscript.org/package/RSrun.3.2.min.js"></script>
</head>
<body>

<div id="glowscript" class="glowscript"></div>

<script type="text/javascript">
// 깃허브 서버 보안 우회 및 컨텍스트 바인딩
window.__context = { 
    glowscript_container: $("#glowscript"),
    lang: "propython",
    version: "3.2"
};

async function __main() {
    // 1. 캔버스 및 화면 설정
    var scene = canvas({title: "동조질량댐퍼(TMD) 내진 설계 시뮬레이션", width: 800, height: 600, center: vector(0, 5, 0)});

    // --- 기본 물리 상수 및 초기 변수 ---
    var g = 9.8;
    var dt = 0.01;
    var t = 0.0;

    // [조작 변수 초기값]
    var earthquake_freq = 1.0;   // 변수 1: 지진파 진동수 (Hz)
    var tmd_mass = 5.0;          // 변수 2: 내진장치 추의 질량 (kg)
    var building_floors = 3;     // 변수 3: 건물 층수 (층)

    // 건물의 물리적 특성
    var building_mass = 50.0;    // 건물 자체 기본 질량
    var k_building = 500.0;      // 건물의 탄성계수 (강성)
    var k_tmd = 50.0;            // TMD 스프링의 탄성계수

    // 상태 변수 (위치, 속도)
    var ground_x = 0.0;
    var building_x = 0.0;
    var building_v = 0.0;
    var tmd_x = 0.0;
    var tmd_v = 0.0;

    // --- 3D 오브젝트 생성 ---
    // 바닥 (지면)
    var ground = box({pos: vector(0, -0.5, 0), size: vector(15, 1, 5), color: color.gray(0.5)});

    // 건물 (층수에 따라 높이가 달라짐)
    var building = box({pos: vector(0, building_floors * 1.5, 0), size: vector(3, building_floors * 3, 3), color: color.blue, opacity: 0.7});

    // 내진 장치 (TMD 추와 연결 스프링 가이드라인)
    var tmd_shadow = cylinder({pos: building.pos.clone().add(vector(0, building.size.y/2 - 0.5, 0)), axis: vector(0,-1,0), radius: 0.1, color: color.white}); 
    var tmd_ball = sphere({pos: tmd_shadow.pos.clone(), radius: 0.4, color: color.red});

    // 실시간 그래프 창 생성
    var graph_scene = graph({title: "건물 및 TMD의 변위 변화", xtitle: "Time (s)", ytitle: "Displacement (m)", width: 800, height: 300});
    var f_building = gcurve({color: color.blue, label: "Building"});
    var f_tmd = gcurve({color: color.red, label: "TMD Pendulum"});

    // --- UI 슬라이더 조작 함수 설정 ---
    function set_freq(s) {
        earthquake_freq = s.value;
        wt_freq.text = earthquake_freq.toFixed(1) + " Hz";
    }

    function set_tmd_mass(s) {
        tmd_mass = s.value;
        wt_mass.text = tmd_mass.toFixed(1) + " kg";
    }

    function set_floors(s) {
        building_floors = int(s.value);
        wt_floors.text = building_floors + " Floors";
        
        // 건물 크기 및 위치 실시간 업데이트 (친구 로직 100% 반영)
        building.size.y = building_floors * 3;
        building.pos.y = building.size.y / 2;
    }

    // UI 텍스트 및 슬라이더 배치
    scene.append_to_caption("\n\n");
    slider({min: 0.2, max: 3.0, value: earthquake_freq, bind: set_freq, step: 0.1});
    scene.append_to_caption(" ◀ 지진파 진동수 (Hz): ");
    var wt_freq = wtext({text: earthquake_freq.toFixed(1) + " Hz"});

    scene.append_to_caption("\n\n");
    slider({min: 0.0, max: 20.0, value: tmd_mass, bind: set_tmd_mass, step: 0.5});
    scene.append_to_caption(" ◀ 내진추 질량 (kg) [0이면 효과 없음]: ");
    var wt_mass = wtext({text: tmd_mass.toFixed(1) + " kg"});

    scene.append_to_caption("\n\n");
    slider({min: 1, max: 5, value: building_floors, bind: set_floors, step: 1});
    scene.append_to_caption(" ◀ 건물 층수 (높이): ");
    var wt_floors = wtext({text: building_floors + " Floors"});

    // --- 메인 시뮬레이션 루프 ---
    while (true) {
        await rate(100); // 브라우저 비동기 멈춤 현상 방지 필수 코드
        
        // 1. 지진파 발생 (지면의 주기적 흔들림 - 단진동)
        var omega_earthquake = 2 * 3.14159 * earthquake_freq;
        ground_x = 0.5 * sin(omega_earthquake * t);
        ground.pos.x = ground_x;
        
        // 2. 건물에 가해지는 물리 법칙 계산
        var effective_k_building = k_building / (building_floors * 0.8);
        
        // 건물에 작용하는 복원력
        var f_b = - effective_k_building * (building_x - ground_x);
        
        // TMD가 건물에 주는 반작용력 계산
        var f_tmd_interaction = - k_tmd * (tmd_x - building_x);
        
        // 건물의 최종 가속도 및 속도, 위치 업데이트
        var building_a = (f_b - f_tmd_interaction) / building_mass;
        building_v += building_a * dt;
        building_x += building_v * dt;
        
        // 3. TMD(내진장치) 물리 계산
        if (tmd_mass > 0) {
            var tmd_a = f_tmd_interaction / tmd_mass;
            tmd_v += tmd_a * dt;
            tmd_x += tmd_v * dt;
        } else {
            tmd_x = building_x;
            tmd_v = 0;
        }
            
        // 4. 3D 그래픽 객체 위치 동기화
        building.pos.x = building_x;
        
        // 💥 시각적 버그 방지: 실시간으로 가변하는 건물의 높이(size.y)를 계산하여 위치 동기화
        tmd_shadow.pos = vector(building_x, building.size.y - 0.5, 0);
        tmd_ball.pos = vector(tmd_x, building.size.y - 0.5, 0);
        
        // 5. 그래프 플로팅 (지면 기준 상대 흔들림)
        f_building.plot(t, building_x - ground_x);
        f_tmd.plot(t, tmd_x - building_x);
        
        t += dt;
    }
}

// 웹페이지 로드가 완료되면 물리 엔진 즉시 가동
$(document).ready(function() {
    __main();
});
</script>

</body>
</html>
